<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Kelikamerat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  text-align: center;
  margin: 0;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.card {
  background: #161b22;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #30363d;
}

.card img {
  width: 300px;
  border-radius: 8px;
}

.time {
  margin-top: 8px;
  font-size: 14px;
}

.fresh { color: #3fb950; }
.old { color: #f85149; }
</style>
</head>

<body>

<h1>Kelikamerat</h1>

<div class="container">
  <div class="card">
    <img id="img1">
    <div id="time1" class="time"></div>
  </div>

  <div class="card">
    <img id="img2">
    <div id="time2" class="time"></div>
  </div>

  <div class="card">
    <img id="img3">
    <div id="time3" class="time"></div>
  </div>
</div>
<script>
const stationId = "C02551";
const panIds = ["C0255101", "C0255102", "C0255109"];

async function getImageTimestamp(url) {
  try {
    const response = await fetch(url, { method: 'HEAD' });
    const lastModified = response.headers.get('last-modified');
    if (lastModified) {
      return new Date(lastModified);
    }
  } catch (e) {}
  
  // Fallback: URL timestamp
  const url = new URL(url);
  const ts = url.searchParams.get('t') || Date.now();
  return new Date(ts);
}

function formatAge(imgTime) {
  const now = Date.now();
  const diffMs = now - imgTime.getTime();
  const diffMin = Math.floor(diffMs / 60000);
  const diffSec = Math.floor((diffMs % 60000) / 1000);
  return diffMin === 0 ? `${diffSec}s` : `${diffMin}min`;
}

async function loadCameras() {
  const response = await fetch(`https://tie.digitraffic.fi/api/weathercam/v1/stations/${stationId}`);
  const data = await response.json();
  const presets = data.properties.presets;

  for (let i = 0; i < panIds.length; i++) {
    const panId = panIds[i];
    const cam = presets.find(p => p.id === panId);
    if (!cam) continue;

    const imgEl = document.getElementById(`img${i + 1}`);
    const timeEl = document.getElementById(`time${i + 1}`);

    // Uusi kuva
    const imageUrl = cam.imageUrl + '?t=' + Date.now();
    imgEl.src = imageUrl;

    // 🔥 KUVAN TOSIASIALLINEN AIKA (last-modified header)
    const photoTime = await getImageTimestamp(imageUrl);
    const age = formatAge(photoTime);
    const timeStr = photoTime.toLocaleString('fi-FI');

    timeEl.innerHTML = `📸 ${timeStr}<br><strong>${age} sitten</strong>`;

    // Väri
    const diffMin = Math.floor((Date.now() - photoTime) / 60000);
    timeEl.className = diffMin < 5 ? 'time fresh' : 
                      diffMin < 15 ? 'time' : 'time old';
  }
}

// Lataa async
loadCameras().catch(console.error);
setInterval(loadCameras, 30000);
</script>
</body>
</html>
