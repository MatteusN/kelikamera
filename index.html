<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Kelikamerat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  text-align: center;
  margin: 0;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.card {
  background: #161b22;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #30363d;
}

.card img {
  width: 300px;
  border-radius: 8px;
}

.time {
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.3;
}

.fresh { color: #3fb950; }
.old { color: #f85149; }
.last-update {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 4px;
}
</style>
</head>

<body>
<h1>Kelikamerat</h1>

<div class="container">
  <div class="card">
    <img id="img1">
    <div id="time1" class="time"></div>
  </div>
  <div class="card">
    <img id="img2">
    <div id="time2" class="time"></div>
  </div>
  <div class="card">
    <img id="img3">
    <div id="time3" class="time"></div>
  </div>
</div>

<div style="margin-top: 20px; font-size: 12px; opacity: 0.8;">
  <div id="lastUpdate" class="last-update">Ladataan...</div>
</div>

<script>
const stationId = "C02551";
const panIds = ["C0255101", "C0255102", "C0255109"];

let lastApiUpdate = null;

function formatRelativeTime(apiUpdateTime) {
  const now = Date.now();
  const diffMs = now - new Date(apiUpdateTime).getTime();
  const diffMin = Math.floor(diffMs / 60000);
  const diffSec = Math.floor((diffMs % 60000) / 1000);
  
  if (diffMin < 1) return `${diffSec}s`;
  if (diffMin < 60) return `${diffMin}min`;
  const hours = Math.floor(diffMin / 60);
  return `${hours}t`;
}

function loadCameras() {
  const loadStart = Date.now();
  
  fetch(`https://tie.digitraffic.fi/api/weathercam/v1/stations/${stationId}`)
    .then(res => res.json())
    .then(data => {
      const presets = data.properties.presets;
      lastApiUpdate = data.properties.dataUpdatedTime;
      
      // Päivitä viimeisin lataus
      const loadTime = new Date(loadStart);
      document.getElementById('lastUpdate').innerHTML = 
        `Viimeksi päivitetty: ${loadTime.toLocaleString('fi-FI')}`;

      panIds.forEach((panId, index) => {
        const cam = presets.find(p => p.id === panId);
        if (!cam) return;

        const img = document.getElementById(`img${index + 1}`);
        const timeEl = document.getElementById(`time${index + 1}`);

        // Lataa kuva
        img.src = cam.imageUrl + "?t=" + Date.now();
        img.alt = cam.name || `Kamera ${index + 1}`;

        // 🔥 SUHTEELLINEN AIKA API:n dataUpdatedTime:sta
        const age = formatRelativeTime(lastApiUpdate);
        timeEl.innerHTML = `<strong>${age} vanha</strong><br>
                           (${new Date(lastApiUpdate).toLocaleString('fi-FI', {
                             timeZone: 'Europe/Helsinki',
                             hour: '2-digit',
                             minute: '2-digit'
                           })})`; 

        // Väri
        const diffMin = Math.floor((Date.now() - new Date(lastApiUpdate)) / 60000);
        timeEl.className = diffMin < 10 ? "time fresh" : 
                          diffMin < 30 ? "time" : "time old";
      });
    })
    .catch(err => {
      console.error("Virhe:", err);
      document.querySelectorAll('.time').forEach(el => {
        el.innerHTML = '❌ Ei yhteyttä';
        el.className = 'time old';
      });
    });
}

// Lataa heti + 30s välein
loadCameras();
setInterval(loadCameras, 30000);
</script>

</body>
</html>
