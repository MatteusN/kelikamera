<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Kelikamerat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  text-align: center;
  margin: 0;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.card {
  background: #161b22;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #30363d;
}

.card img {
  width: 300px;
  border-radius: 8px;
}

.time {
  margin-top: 8px;
  font-size: 14px;
}

.fresh { color: #3fb950; }
.old { color: #f85149; }
</style>
</head>

<body>

<h1>Kelikamerat</h1>

<div class="container">
  <div class="card">
    <img id="img1">
    <div id="time1" class="time"></div>
  </div>

  <div class="card">
    <img id="img2">
    <div id="time2" class="time"></div>
  </div>

  <div class="card">
    <img id="img3">
    <div id="time3" class="time"></div>
  </div>
</div>
<script>
const stationId = "C02551";
const panIds = ["C0255101", "C0255102", "C0255109"];

function getExifTime(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      
      // Lue EXIF (yksinkertainen heuristic)
      const timestamp = Date.now(); // Fallback
      resolve(new Date(timestamp));
    };
    img.src = url + '?t=' + Date.now();
  });
}

async function loadCameras() {
  const response = await fetch(`https://tie.digitraffic.fi/api/weathercam/v1/stations/${stationId}`);
  const data = await response.json();
  const presets = data.properties.presets;
  
  console.log("API data:", data.properties.dataUpdatedTime);

  for (let index = 0; index < panIds.length; index++) {
    const panId = panIds[index];
    const cam = presets.find(p => p.id === panId);
    if (!cam) continue;

    const imgEl = document.getElementById(`img${index + 1}`);
    const timeEl = document.getElementById(`time${index + 1}`);

    // Lataa kuva
    imgEl.src = cam.imageUrl + '?t=' + Date.now();
    
    // Lue EXIF / ota kuvan URL timestamp
    const imgUrl = imgEl.src;
    const url = new URL(imgUrl);
    let photoTime;
    
    // Kokeile URL timestamp ensin
    const urlTs = url.searchParams.get('updated') || url.searchParams.get('t');
    if (urlTs) {
      photoTime = new Date(parseInt(urlTs));
    } else {
      // Fallback: API aika + Suomen timezone
      photoTime = new Date(data.properties.dataUpdatedTime);
      photoTime.setHours(photoTime.getHours() + 2); // UTC → Suomi
    }

    const now = Date.now();
    const ageMs = now - photoTime.getTime();
    const ageMin = Math.floor(ageMs / 60000);
    const ageSec = Math.floor((ageMs % 60000) / 1000);
    const ageStr = ageMin === 0 ? `${ageSec}s` : `${ageMin}min`;

    const timeStr = photoTime.toLocaleString('fi-FI', { 
      timeZone: 'Europe/Helsinki',
      hour12: false 
    });

    timeEl.innerHTML = `📸 ${timeStr}<br><strong>${ageStr} sitten</strong>`;
    
    // Väri
    timeEl.className = ageMin < 5 ? 'time fresh' : 
                      ageMin < 15 ? 'time' : 'time old';
  }
}

loadCameras();
setInterval(loadCameras, 30000);
</script>

</body>
</html>
