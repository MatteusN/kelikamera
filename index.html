<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Kelikamerat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  text-align: center;
  margin: 0;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.card {
  background: #161b22;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #30363d;
}

.card img {
  width: 300px;
  border-radius: 8px;
}

.time {
  margin-top: 8px;
  font-size: 14px;
}

.fresh { color: #3fb950; }
.old { color: #f85149; }
</style>
</head>

<body>

<h1>Kelikamerat</h1>

<div class="container">
  <div class="card">
    <img id="img1">
    <div id="time1" class="time"></div>
  </div>

  <div class="card">
    <img id="img2">
    <div id="time2" class="time"></div>
  </div>

  <div class="card">
    <img id="img3">
    <div id="time3" class="time"></div>
  </div>
</div>

<script>
const stationId = "C02551";

const panIds = [
  "C0255101",
  "C0255102",
  "C0255109"
];

function loadCameras() {
  fetch(`https://tie.digitraffic.fi/api/weathercam/v1/stations/${stationId}`)
    .then(res => res.json())
    .then(data => {
      const presets = data.properties.presets;

      console.log("DATA:", presets); // debug

      panIds.forEach((panId, index) => {

        const cam = presets.find(p => p.id === panId);

        if (!cam) return;

        const img = document.getElementById(`img${index + 1}`);
        const timeEl = document.getElementById(`time${index + 1}`);

        // KUVA
        img.src = cam.imageUrl + "?t=" + Date.now();

        // 🔥 AIKA (VARMA fallback)
        const updatedTime = data.properties.dataUpdatedTime;

const time = new Date(updatedTime);
const now = new Date();

const diffMin = Math.floor((now - time) / 60000);
const formatted = time.toLocaleString("fi-FI");

timeEl.innerText = `Päivitetty: ${formatted} (${diffMin} min sitten)`;

// Väri
if (diffMin < 10) {
  timeEl.className = "time fresh";
} else {
  timeEl.className = "time old";
}

        // STATUS VÄRI
        if (diffMin < 10) {
          timeEl.className = "time fresh";
        } else {
          timeEl.className = "time old";
        }

      });
    })
    .catch(err => console.log("Virhe:", err));
}

// Lataa heti
loadCameras();

// Päivitä 30 sek välein
setInterval(loadCameras, 30000);
</script>

</body>
</html>
