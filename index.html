<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Kelikamerat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  text-align: center;
  margin: 0;
}

h1 {
  margin-top: 20px;
}

/* Container */
.container {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 30px;
  flex-wrap: wrap;
}

/* Card */
.card {
  background: #161b22;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #30363d;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  transition: 0.2s;
}

/* Hover efekti */
.card:hover {
  transform: translateY(-5px);
  border-color: #58a6ff;
}

/* Kuva */
.card img {
  width: 300px;
  border-radius: 8px;
}

/* Aika */
.time {
  margin-top: 10px;
  font-size: 14px;
}

/* Status värit */
.fresh {
  color: #3fb950;
}

.old {
  color: #f85149;
}
</style>
</head>

<body>

<h1>Kelikamerat</h1>

<div class="container">
  <div class="card">
    <img id="img1">
    <div id="time1" class="time"></div>
  </div>

  <div class="card">
    <img id="img2">
    <div id="time2" class="time"></div>
  </div>

  <div class="card">
    <img id="img3">
    <div id="time3" class="time"></div>
  </div>
</div>

<script>
// Kamera ID
const stationId = "C02551";

// cameraPanId:t (voit vaihtaa nämä)
const panIds = [
  "C0255101",
  "C0255102",
  "C0255109"
];

function loadCameras() {
  fetch(`https://tie.digitraffic.fi/api/weathercam/v1/stations/${stationId}`)
    .then(res => res.json())
    .then(data => {
      const presets = data.properties.presets;

      panIds.forEach((panId, index) => {
        const cam = presets.find(p => p.id === panId);

        if (cam) {
          const img = document.getElementById(`img${index + 1}`);
          const timeEl = document.getElementById(`time${index + 1}`);

          // Kuva
          img.src = cam.imageUrl;

          // Aika
          const time = new Date(cam.lastUpdated);
const now = new Date();

const diffMin = Math.floor((now - time) / 60000);
const formatted = time.toLocaleString("fi-FI");

timeEl.innerText = `Päivitetty: ${formatted} (${diffMin} min sitten)`;

          // Teksti
          timeEl.innerText = `Päivitetty: ${formatted} (${diffMin} min sitten)`;

          // Väri (live status)
          if (diffMin < 10) {
            timeEl.className = "time fresh";
          } else {
            timeEl.className = "time old";
          }
        }
      });
    })
    .catch(err => console.log("Virhe:", err));
}

// Lataa heti
loadCameras();

// Päivitä 30 sek välein
setInterval(loadCameras, 30000);
</script>

</body>
</html>
